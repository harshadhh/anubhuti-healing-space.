name: Deploy Anubhuti Website to GitHub Pages

on:
  push:
    branches:
      - main          # runs every time you push to main

  # Allow manual trigger from the Actions tab
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # 1. Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Inject GitHub Actions secrets/vars into config.js
      #    We prepend the GITHUB_ACTIONS_CONFIG object at the top of the committed config.js.
      #    This prioritizes GitHub Actions variables first, falling back to config.js defaults.
      - name: Prepend GitHub Actions secrets to config.js
        run: |
          node -e '
            const fs = require("fs");
            const content = fs.readFileSync("config.js", "utf8");
            
            const secrets = {
              emailjs: {
                serviceId:  process.env.EMAILJS_SERVICE_ID || process.env.VARS_EMAILJS_SERVICE_ID,
                templateId: process.env.EMAILJS_TEMPLATE_ID || process.env.VARS_EMAILJS_TEMPLATE_ID,
                publicKey:  process.env.EMAILJS_PUBLIC_KEY || process.env.VARS_EMAILJS_PUBLIC_KEY
              },
              firebase: {
                apiKey:            process.env.FIREBASE_API_KEY || process.env.VARS_FIREBASE_API_KEY,
                authDomain:        process.env.FIREBASE_AUTH_DOMAIN || process.env.VARS_FIREBASE_AUTH_DOMAIN,
                projectId:         process.env.FIREBASE_PROJECT_ID || process.env.VARS_FIREBASE_PROJECT_ID,
                storageBucket:     process.env.FIREBASE_STORAGE_BUCKET || process.env.VARS_FIREBASE_STORAGE_BUCKET,
                messagingSenderId: process.env.FIREBASE_MESSAGING_SENDER_ID || process.env.VARS_FIREBASE_MESSAGING_SENDER_ID,
                appId:             process.env.FIREBASE_APP_ID || process.env.VARS_FIREBASE_APP_ID
              },
              cloudinary: {
                cloudName:    process.env.CLOUDINARY_CLOUD_NAME || process.env.VARS_CLOUDINARY_CLOUD_NAME,
                uploadPreset: process.env.CLOUDINARY_UPLOAD_PRESET || process.env.VARS_CLOUDINARY_UPLOAD_PRESET
              }
            };
            
            const header = "window.GITHUB_ACTIONS_CONFIG = " + JSON.stringify(secrets, null, 2) + ";\n\n";
            fs.writeFileSync("config.js", header + content, "utf8");
            console.log("Prepend successful.");
          '
        env:
          EMAILJS_SERVICE_ID: ${{ secrets.EMAILJS_SERVICE_ID }}
          VARS_EMAILJS_SERVICE_ID: ${{ vars.EMAILJS_SERVICE_ID }}
          EMAILJS_TEMPLATE_ID: ${{ secrets.EMAILJS_TEMPLATE_ID }}
          VARS_EMAILJS_TEMPLATE_ID: ${{ vars.EMAILJS_TEMPLATE_ID }}
          EMAILJS_PUBLIC_KEY: ${{ secrets.EMAILJS_PUBLIC_KEY }}
          VARS_EMAILJS_PUBLIC_KEY: ${{ vars.EMAILJS_PUBLIC_KEY }}
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          VARS_FIREBASE_API_KEY: ${{ vars.VARS_FIREBASE_API_KEY || vars.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          VARS_FIREBASE_AUTH_DOMAIN: ${{ vars.VARS_FIREBASE_AUTH_DOMAIN || vars.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          VARS_FIREBASE_PROJECT_ID: ${{ vars.VARS_FIREBASE_PROJECT_ID || vars.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          VARS_FIREBASE_STORAGE_BUCKET: ${{ vars.VARS_FIREBASE_STORAGE_BUCKET || vars.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          VARS_FIREBASE_MESSAGING_SENDER_ID: ${{ vars.VARS_FIREBASE_MESSAGING_SENDER_ID || vars.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          VARS_FIREBASE_APP_ID: ${{ vars.VARS_FIREBASE_APP_ID || vars.FIREBASE_APP_ID }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          VARS_CLOUDINARY_CLOUD_NAME: ${{ vars.VARS_CLOUDINARY_CLOUD_NAME || vars.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_UPLOAD_PRESET: ${{ secrets.CLOUDINARY_UPLOAD_PRESET }}
          VARS_CLOUDINARY_UPLOAD_PRESET: ${{ vars.VARS_CLOUDINARY_UPLOAD_PRESET || vars.CLOUDINARY_UPLOAD_PRESET }}

      # 3. Configure GitHub Pages
      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      # 4. Upload the whole folder as a Pages artifact
      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'          # deploy the entire repo root

      # 5. Deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
