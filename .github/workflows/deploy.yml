name: Deploy Anubhuti Website to GitHub Pages

on:
  push:
    branches:
      - main          # runs every time you push to main

  # Allow manual trigger from the Actions tab
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # 1. Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Build api-helpers.js from GitHub Secrets
      #    This creates the api-helpers.js file dynamically at build time.
      #    It reads the credentials exclusively from GitHub Actions secrets/vars.
      - name: Generate api-helpers.js from secrets
        run: |
          cat > api-helpers.js << 'ENDOFFILE'
          // Auto-generated by GitHub Actions — DO NOT EDIT MANUALLY
          const CONFIG = {
            emailjs: {
              serviceId:  "${{ secrets.EMAILJS_SERVICE_ID || vars.EMAILJS_SERVICE_ID }}",
              templateId: "${{ secrets.EMAILJS_TEMPLATE_ID || vars.EMAILJS_TEMPLATE_ID }}",
              publicKey:  "${{ secrets.EMAILJS_PUBLIC_KEY || vars.EMAILJS_PUBLIC_KEY }}"
            },
            firebase: {
              apiKey:            "${{ secrets.FIREBASE_API_KEY || vars.FIREBASE_API_KEY }}",
              authDomain:        "${{ secrets.FIREBASE_AUTH_DOMAIN || vars.FIREBASE_AUTH_DOMAIN }}",
              projectId:         "${{ secrets.FIREBASE_PROJECT_ID || vars.FIREBASE_PROJECT_ID }}",
              storageBucket:     "${{ secrets.FIREBASE_STORAGE_BUCKET || vars.FIREBASE_STORAGE_BUCKET }}",
              messagingSenderId: "${{ secrets.FIREBASE_MESSAGING_SENDER_ID || vars.FIREBASE_MESSAGING_SENDER_ID }}",
              appId:             "${{ secrets.FIREBASE_APP_ID || vars.FIREBASE_APP_ID }}"
            },
            cloudinary: {
              cloudName:    "${{ secrets.CLOUDINARY_CLOUD_NAME || vars.CLOUDINARY_CLOUD_NAME || 'drysec0jr' }}",
              uploadPreset: "${{ secrets.CLOUDINARY_UPLOAD_PRESET || vars.CLOUDINARY_UPLOAD_PRESET || 'anubhuti-healing-space' }}"
            }
          };

          function sendEmailjsForm(templateParams) {
            if (!CONFIG.emailjs.publicKey || CONFIG.emailjs.publicKey.startsWith("YOUR_") || CONFIG.emailjs.publicKey.includes("_PLACEHOLDER")) {
              console.warn("EmailJS not configured.");
              console.log(templateParams);
              return new Promise((resolve) => setTimeout(() => resolve({ mock: true }), 1000));
            }
            return fetch("https://api.emailjs.com/api/v1.0/email/send", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                service_id:      CONFIG.emailjs.serviceId,
                template_id:     CONFIG.emailjs.templateId,
                user_id:         CONFIG.emailjs.publicKey,
                template_params: templateParams
              })
            }).then(response => {
              if (!response.ok) {
                return response.text().then(text => { throw new Error(text || "EmailJS send failed"); });
              }
              return response;
            });
          }

          let db = null;
          if (typeof firebase !== "undefined") {
            if (CONFIG.firebase.projectId && !CONFIG.firebase.projectId.startsWith("YOUR_") && !CONFIG.firebase.projectId.includes("_PLACEHOLDER")) {
              try {
                firebase.initializeApp(CONFIG.firebase);
                db = firebase.firestore();
              } catch (e) {
                console.error("Firebase init error:", e);
              }
            }
          }
          ENDOFFILE

      # 3. Configure GitHub Pages
      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      # 4. Upload the whole folder as a Pages artifact
      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'          # deploy the entire repo root

      # 5. Deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
